<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contas — FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div><strong>FinanceZap</strong><small>Dashboard</small></div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="dash-page-head">
        <h1>Contas Bancárias</h1>
        <p>Gerencie suas contas e acompanhe o saldo por instituição</p>
      </div>
      <div id="alert"></div>

      <!-- Resumo de saldo total -->
      <div id="summary-cards" class="accounts-summary"></div>

      <!-- Formulário nova conta -->
      <div class="dash-card" style="margin-bottom:1rem">
        <h2 style="margin:0 0 1rem;font-size:.95rem">Nova conta</h2>
        <form id="new-account" class="accounts-form">
          <div class="accounts-form-row2">
            <div class="dash-form-row" style="margin:0;flex:1">
              <label for="aname">Nome da conta</label>
              <input id="aname" type="text" placeholder="Ex.: Nubank, Itaú" required />
            </div>
            <div class="dash-form-row" style="margin:0;flex:1">
              <label for="abank">Banco / Instituição</label>
              <input id="abank" type="text" placeholder="Opcional" />
            </div>
          </div>
          <div class="accounts-form-row2">
            <div class="dash-form-row" style="margin:0;flex:1">
              <label for="atype">Tipo</label>
              <select id="atype">
                <option value="corrente">Corrente</option>
                <option value="poupança">Poupança</option>
                <option value="digital">Digital</option>
                <option value="cartão">Cartão</option>
                <option value="investimento">Investimento</option>
                <option value="outro">Outro</option>
              </select>
            </div>
            <div class="dash-form-row" style="margin:0;flex:1">
              <label for="abal">Saldo inicial (R$)</label>
              <input id="abal" type="number" step="0.01" placeholder="0,00" />
            </div>
          </div>
          <div class="accounts-form-actions">
            <div class="dash-form-row" style="margin:0">
              <label for="acolor">Cor</label>
              <input id="acolor" type="color" value="#10B981" class="accounts-color-input" />
            </div>
            <button type="submit" class="dash-btn dash-btn-primary accounts-submit-btn">+ Adicionar</button>
          </div>
        </form>
      </div>

      <!-- Lista de contas -->
      <div class="dash-card">
        <h2 style="margin:0 0 1rem;font-size:.95rem">Suas contas</h2>
        <div id="accounts-list" class="dash-stack"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    (async () => {
      const cfg = await fetch('/api/config').then(r => r.json());
      window.__SUPABASE_URL__ = cfg.supabaseUrl;
      window.__SUPABASE_ANON_KEY__ = cfg.supabaseAnonKey;
    })();
  </script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderSidebarNav("contas");

    const TYPE_ICON = {
      corrente: "🏦", poupança: "🐷", digital: "📱",
      cartão: "💳", investimento: "📈", outro: "🏷️"
    };

    function esc(s) {
      const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML;
    }

    async function load() {
      const alertEl = document.getElementById("alert");
      alertEl.innerHTML = "";
      try {
        const accounts = await apiFetch("/bank-accounts") || [];
        renderSummary(accounts);
        renderAccounts(accounts);
      } catch(e) {
        alertEl.innerHTML = `<div class="dash-alert">${esc(e.message)}</div>`;
      }
    }

    function renderSummary(accounts) {
      const el = document.getElementById("summary-cards");
      if (!accounts.length) { el.innerHTML = ""; return; }

      const total = accounts.reduce((s, a) => s + Number(a.balance), 0);

      const cards = [
        { label: "Saldo total", value: fmtBRL(total), icon: "💰", color: "#10B981" },
        { label: "Contas", value: accounts.length, icon: "🏦", color: "#3B82F6" },
      ];

      el.innerHTML = cards.map(c => `
        <div class="dash-kpi" style="--kpi-color:${c.color}">
          <span>${c.icon} ${c.label}</span>
          <strong>${c.value}</strong>
        </div>
      `).join("");
    }

    function renderAccounts(accounts) {
      const root = document.getElementById("accounts-list");
      if (!accounts.length) {
        root.innerHTML = '<p class="dash-empty">Nenhuma conta cadastrada. Adicione acima.</p>';
        return;
      }

      root.innerHTML = accounts.map(a => `
        <div class="dash-subcard dash-bill-row">
          <div style="display:flex;align-items:center;gap:.85rem">
            <div style="width:10px;height:40px;border-radius:4px;background:${esc(a.color || '#10B981')};flex-shrink:0"></div>
            <div>
              <div style="display:flex;align-items:center;gap:.5rem">
                <span style="font-size:1rem">${TYPE_ICON[a.account_type] || "🏦"}</span>
                <strong style="font-size:.95rem">${esc(a.name)}</strong>
                <span class="dash-badge" style="font-size:.68rem;padding:.15rem .45rem">${esc(a.account_type)}</span>
              </div>
              ${a.bank_name ? `<div class="dash-note" style="margin-top:.2rem">${esc(a.bank_name)}</div>` : ""}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
            <div style="font-size:1.25rem;font-weight:800;color:${Number(a.balance) >= 0 ? 'var(--dash-income)' : 'var(--dash-expense)'}">
              ${fmtBRL(a.balance)}
            </div>
            <div style="display:flex;gap:.4rem">
              <button class="dash-btn dash-btn-ghost dash-btn-tiny upd-btn" data-id="${a.id}" data-bal="${a.balance}">Atualizar saldo</button>
              <button class="dash-btn dash-btn-ghost dash-btn-tiny edit-btn"
                data-id="${a.id}" data-name="${esc(a.name)}" data-bank="${esc(a.bank_name||'')}"
                data-type="${a.account_type}" data-color="${esc(a.color||'#10B981')}">Editar</button>
              <button class="dash-btn dash-btn-danger dash-btn-tiny del-btn" data-id="${a.id}">Excluir</button>
            </div>
          </div>
        </div>
      `).join("");

      root.querySelectorAll(".upd-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const cur = btn.dataset.bal;
          const v = prompt("Novo saldo (R$)?", cur);
          if (v == null) return;
          const n = Number(String(v).replace(",", "."));
          if (!Number.isFinite(n)) return;
          try {
            await apiFetch(`/bank-accounts/${id}`, { method: "PATCH", body: JSON.stringify({ balance: n }) });
            await load();
          } catch(e) { alert(e.message); }
        });
      });

      root.querySelectorAll(".edit-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const name = prompt("Nome da conta:", btn.dataset.name);
          if (!name || !name.trim()) return;
          const bank_name = prompt("Banco/Instituição (deixe vazio para limpar):", btn.dataset.bank);
          if (bank_name == null) return;
          try {
            await apiFetch(`/bank-accounts/${id}`, {
              method: "PATCH",
              body: JSON.stringify({ name: name.trim(), bank_name: bank_name.trim() || null }),
            });
            await load();
          } catch(e) { alert(e.message); }
        });
      });

      root.querySelectorAll(".del-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Excluir esta conta? Os lançamentos vinculados perdem a referência.")) return;
          try {
            await apiFetch(`/bank-accounts/${btn.dataset.id}`, { method: "DELETE" });
            await load();
          } catch(e) { alert(e.message); }
        });
      });
    }

    document.getElementById("new-account").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const name = document.getElementById("aname").value.trim();
      if (!name) return;
      const body = {
        name,
        bank_name: document.getElementById("abank").value.trim() || null,
        account_type: document.getElementById("atype").value,
        balance: parseFloat(document.getElementById("abal").value) || 0,
        color: document.getElementById("acolor").value,
      };
      try {
        await apiFetch("/bank-accounts", { method: "POST", body: JSON.stringify(body) });
        document.getElementById("aname").value = "";
        document.getElementById("abank").value = "";
        document.getElementById("abal").value = "";
        await load();
      } catch(e) {
        document.getElementById("alert").innerHTML = `<div class="dash-alert">${esc(e.message)}</div>`;
      }
    });

    window.addEventListener("DOMContentLoaded", async () => {
      let tries = 0;
      while (!window.__SUPABASE_URL__ && tries++ < 30) await new Promise(r => setTimeout(r, 100));
      const ok = await checkAccess();
      if (!ok) return;
      renderSidebarUser();
      load();
    });
  </script>
</body>
</html>
