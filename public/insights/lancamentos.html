<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lançamentos — FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div>
            <strong>FinanceZap</strong>
            <small>Dashboard</small>
          </div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="dash-page-head">
        <h1>Novo lançamento</h1>
        <p>Inclua entradas, saídas e compras parceladas de forma simples</p>
      </div>
      <div id="alert"></div>
      <div class="dash-card" style="max-width:32rem">
        <form id="f">
          <div class="dash-form-row">
            <label for="kind">Tipo</label>
            <select id="kind" required>
              <option value="expense">Saída (gasto)</option>
              <option value="income">Entrada (receita)</option>
              <option value="credit_card">Compra no cartão</option>
            </select>
          </div>

          <!-- Campos para receita/despesa -->
          <div id="normal-fields">
            <div class="dash-form-row">
              <label for="categorySelect">Categoria</label>
              <select id="categorySelect" style="max-width:28rem">
                <option value="">Carregando…</option>
              </select>
              <div id="categoryCustomWrap" class="dash-form-row" style="display:none;margin-top:.75rem;margin-bottom:0">
                <label for="categoryCustom">Nome da categoria</label>
                <input id="categoryCustom" type="text" placeholder="Ex.: Tokio, Aluguel centro" maxlength="200" />
              </div>
            </div>
            <div class="dash-form-row" id="payment-method-row">
              <label for="paymentMethod">Forma de pagamento</label>
              <select id="paymentMethod">
                <option value="">Não informar</option>
                <option value="pix">PIX</option>
                <option value="debito">Débito</option>
                <option value="boleto">Boleto</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="transferencia">Transferência</option>
              </select>
            </div>
          </div>

          <!-- Campos para cartão de crédito -->
          <div id="card-fields" style="display:none">
            <div class="dash-form-row">
              <label for="cardSelect">Qual cartão?</label>
              <select id="cardSelect">
                <option value="">Carregando…</option>
              </select>
            </div>
            <div class="dash-form-row">
              <label for="cardCategorySelect">Categoria</label>
              <select id="cardCategorySelect" style="max-width:28rem">
                <option value="">Carregando…</option>
              </select>
              <div id="cardCategoryCustomWrap" class="dash-form-row" style="display:none;margin-top:.75rem;margin-bottom:0">
                <label for="cardCategoryCustom">Nome da categoria</label>
                <input id="cardCategoryCustom" type="text" placeholder="Ex.: Restaurante, Streaming" maxlength="200" />
              </div>
            </div>
            <div class="dash-form-row">
              <label for="installments">Em quantas parcelas?</label>
              <select id="installments">
                <option value="1">À vista (1x)</option>
                <option value="2">2x</option>
                <option value="3">3x</option>
                <option value="4">4x</option>
                <option value="5">5x</option>
                <option value="6">6x</option>
                <option value="7">7x</option>
                <option value="8">8x</option>
                <option value="9">9x</option>
                <option value="10">10x</option>
                <option value="12">12x</option>
                <option value="18">18x</option>
                <option value="24">24x</option>
              </select>
            </div>
          </div>

          <!-- Campos comuns -->
          <div class="dash-form-row">
            <label for="amount">Valor (R$)</label>
            <input id="amount" type="number" step="0.01" min="0.01" required placeholder="0,00" />
          </div>
          <div class="dash-form-row">
            <label for="occurred_on">Data</label>
            <input id="occurred_on" type="date" required />
          </div>
          <div class="dash-form-row">
            <label for="description">Descrição (opcional)</label>
            <textarea id="description" rows="2" placeholder="Detalhes"></textarea>
          </div>
          <button type="submit" class="dash-btn dash-btn-primary">✚ Salvar lançamento</button>
        </form>
      </div>
      <p class="dash-note" style="margin-top:1.25rem;max-width:32rem">
        Lançamentos pelo WhatsApp aparecem com origem <strong>whatsapp</strong> em Gastos.
      </p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderSidebarNav("lanc");
    document.getElementById("occurred_on").value = new Date().toISOString().slice(0, 10);

    const kindEl = document.getElementById("kind");
    const normalFields = document.getElementById("normal-fields");
    const cardFields = document.getElementById("card-fields");
    const categorySelect = document.getElementById("categorySelect");
    const categoryCustomWrap = document.getElementById("categoryCustomWrap");
    const categoryCustom = document.getElementById("categoryCustom");
    const cardCategorySelect = document.getElementById("cardCategorySelect");
    const cardCategoryCustomWrap = document.getElementById("cardCategoryCustomWrap");
    const cardCategoryCustom = document.getElementById("cardCategoryCustom");

    function escapeHtml(s) {
      const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
    }
    function escAttr(s) {
      return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
    }

    function setCategoryMode() {
      if (categorySelect.value === "__new__") {
        categoryCustomWrap.style.display = "block";
        categoryCustom.required = true;
      } else {
        categoryCustomWrap.style.display = "none";
        categoryCustom.required = false;
        categoryCustom.value = "";
      }
    }

    function setCardCategoryMode() {
      if (cardCategorySelect.value === "__new__") {
        cardCategoryCustomWrap.style.display = "block";
        cardCategoryCustom.required = true;
      } else {
        cardCategoryCustomWrap.style.display = "none";
        cardCategoryCustom.required = false;
        cardCategoryCustom.value = "";
      }
    }

    categorySelect.addEventListener("change", setCategoryMode);
    cardCategorySelect.addEventListener("change", setCardCategoryMode);

    function currentKind() {
      return kindEl.value || "expense";
    }

    async function loadCategories() {
      categorySelect.innerHTML = '<option value="">Carregando…</option>';
      const k = currentKind() === "income" ? "income" : "expense";
      try {
        const list = await apiFetch("/categories/" + encodeURIComponent(k));
        if (!list) return;
        categorySelect.innerHTML =
          '<option value="">Selecione a categoria</option>' +
          list.map(c => `<option value="${escAttr(c)}">${escapeHtml(c)}</option>`).join("") +
          '<option value="__new__">Outra categoria (digitar)…</option>';
      } catch(e) {
        categorySelect.innerHTML = '<option value="">Erro ao carregar</option><option value="__new__">Digitar categoria…</option>';
      }
      setCategoryMode();
    }

    async function loadCardCategories() {
      cardCategorySelect.innerHTML = '<option value="">Carregando…</option>';
      try {
        const list = await apiFetch("/categories/expense");
        if (!list) return;
        cardCategorySelect.innerHTML =
          '<option value="">Selecione a categoria</option>' +
          list.map(c => `<option value="${escAttr(c)}">${escapeHtml(c)}</option>`).join("") +
          '<option value="__new__">Outra categoria (digitar)…</option>';
      } catch(e) {
        cardCategorySelect.innerHTML = '<option value="">Erro ao carregar</option><option value="__new__">Digitar categoria…</option>';
      }
      setCardCategoryMode();
    }

    async function loadCards() {
      const cardSelect = document.getElementById("cardSelect");
      cardSelect.innerHTML = '<option value="">Carregando…</option>';
      try {
        const cards = await apiFetch("/credit-cards");
        if (!cards || !cards.length) {
          cardSelect.innerHTML = '<option value="">Nenhum cartão cadastrado</option>';
          return;
        }
        cardSelect.innerHTML =
          '<option value="">Selecione o cartão</option>' +
          cards.map(c => `<option value="${escAttr(c.id)}">${escapeHtml(c.name)}</option>`).join("");
      } catch(e) {
        cardSelect.innerHTML = '<option value="">Erro ao carregar cartões</option>';
      }
    }

    async function onKindChange() {
      const k = kindEl.value;
      if (k === "credit_card") {
        normalFields.style.display = "none";
        cardFields.style.display = "block";
        categorySelect.required = false;
        await loadCards();
        await loadCardCategories();
      } else {
        normalFields.style.display = "block";
        cardFields.style.display = "none";
        categorySelect.required = true;
        await loadCategories();
      }
    }

    kindEl.addEventListener("change", onKindChange);

    function resolvedCategory() {
      if (categorySelect.value === "__new__") return (categoryCustom.value || "").trim() || "Geral";
      return (categorySelect.value || "").trim() || "Geral";
    }

    function resolvedCardCategory() {
      if (cardCategorySelect.value === "__new__") return (cardCategoryCustom.value || "").trim() || "Geral";
      return (cardCategorySelect.value || "").trim() || "Geral";
    }

    document.getElementById("f").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const alertEl = document.getElementById("alert");
      alertEl.innerHTML = "";

      const k = kindEl.value;

      if (k === "credit_card") {
        const cardId = document.getElementById("cardSelect").value;
        if (!cardId) {
          alertEl.innerHTML = '<div class="dash-alert">Selecione um cartão.</div>';
          return;
        }
        if (cardCategorySelect.value === "__new__" && !(cardCategoryCustom.value || "").trim()) {
          alertEl.innerHTML = '<div class="dash-alert">Informe o nome da categoria ou escolha uma da lista.</div>';
          return;
        }
        if (!cardCategorySelect.value) {
          alertEl.innerHTML = '<div class="dash-alert">Selecione uma categoria.</div>';
          return;
        }
        const body = {
          card_id: cardId,
          category: resolvedCardCategory(),
          amount: document.getElementById("amount").value,
          installments: parseInt(document.getElementById("installments").value, 10) || 1,
          purchase_date: document.getElementById("occurred_on").value,
          description: document.getElementById("description").value || null,
        };
        try {
          await apiFetch("/credit-card-transactions", { method: "POST", body: JSON.stringify(body) });
          alertEl.innerHTML = '<div class="dash-alert dash-alert-ok">✓ Lançamento no cartão salvo!</div>';
          document.getElementById("amount").value = "";
          document.getElementById("description").value = "";
        } catch(e) {
          alertEl.innerHTML = '<div class="dash-alert">' + (e.message || "Erro") + '</div>';
        }
        return;
      }

      // receita ou despesa
      if (categorySelect.value === "__new__" && !(categoryCustom.value || "").trim()) {
        alertEl.innerHTML = '<div class="dash-alert">Informe o nome da nova categoria ou escolha uma da lista.</div>';
        return;
      }
      if (!categorySelect.value) {
        alertEl.innerHTML = '<div class="dash-alert">Selecione uma categoria.</div>';
        return;
      }
      const pm = document.getElementById("paymentMethod").value || null;
      const body = {
        kind: k,
        category: resolvedCategory(),
        amount: document.getElementById("amount").value,
        occurred_on: document.getElementById("occurred_on").value,
        description: document.getElementById("description").value || null,
        payment_method: pm || null,
        source: "manual",
      };
      try {
        await apiFetch("/transactions", { method: "POST", body: JSON.stringify(body) });
        alertEl.innerHTML = '<div class="dash-alert dash-alert-ok">✓ Lançamento salvo com sucesso!</div>';
        document.getElementById("amount").value = "";
        document.getElementById("description").value = "";
        document.getElementById("paymentMethod").value = "";
        await loadCategories();
      } catch(e) {
        alertEl.innerHTML = '<div class="dash-alert">' + (e.message || "Erro") + '</div>';
      }
    });

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await checkAccess();
      if (!ok) return;
      await renderSidebarUser();
      loadCategories();
    });
  </script>
</body>
</html>
