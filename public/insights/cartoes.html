<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cartões de Crédito — FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .credit-card-visual {
      border-radius: 16px; padding: 1.5rem; position: relative; overflow: hidden;
      min-height: 160px; display: flex; flex-direction: column; justify-content: space-between;
      cursor: pointer; transition: transform .15s, box-shadow .15s;
      border: 2px solid transparent;
    }
    .credit-card-visual:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.4); }
    .credit-card-visual.selected { border-color: rgba(255,255,255,.5); }
    .cc-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .cc-name { font-size: 1rem; font-weight: 800; color: #fff; }
    .cc-bank { font-size: .75rem; color: rgba(255,255,255,.7); margin-top: .1rem; }
    .cc-actions { display: flex; gap: .35rem; }
    .cc-btn { background: rgba(0,0,0,.25); border: none; color: rgba(255,255,255,.8); border-radius: 8px; padding: .3rem .6rem; font-size: .72rem; cursor: pointer; font-family: inherit; font-weight: 600; }
    .cc-btn:hover { background: rgba(0,0,0,.4); color: #fff; }
    .cc-mid { margin-top: .75rem; }
    .cc-number { font-size: .85rem; color: rgba(255,255,255,.6); letter-spacing: .1em; }
    .cc-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: .75rem; }
    .cc-limit-label { font-size: .65rem; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: .06em; }
    .cc-limit-value { font-size: 1.1rem; font-weight: 800; color: #fff; }
    .cc-days { font-size: .75rem; color: rgba(255,255,255,.65); }
    .add-card-btn {
      border-radius: 16px; padding: 1.5rem; min-height: 160px;
      border: 2px dashed rgba(255,255,255,.1); background: rgba(255,255,255,.03);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; gap: .5rem; transition: all .15s; color: var(--slate);
    }
    .add-card-btn:hover { border-color: rgba(16,185,129,.4); color: var(--emerald); background: rgba(16,185,129,.04); }
    .add-card-btn span:first-child { font-size: 2rem; }
    .add-card-btn span:last-child { font-size: .85rem; font-weight: 600; }
    .statement-section { display: none; }
    .statement-section.visible { display: block; }
    .month-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .month-nav button { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); color: #fff; padding: .4rem .8rem; border-radius: 8px; cursor: pointer; font-size: .85rem; }
    .month-nav span { font-weight: 700; font-size: .95rem; }
    .tx-row { display: flex; justify-content: space-between; align-items: center; padding: .7rem 0; border-bottom: 1px solid rgba(255,255,255,.04); }
    .tx-row:last-child { border-bottom: none; }
    .tx-desc { font-size: .88rem; font-weight: 600; }
    .tx-meta { font-size: .72rem; color: var(--slate-light); margin-top: .15rem; }
    .tx-amount { font-size: .9rem; font-weight: 700; color: #FCA5A5; }
    .tx-installment { font-size: .7rem; color: var(--slate); }
    .summary-bar { display: flex; gap: 1.5rem; padding: 1rem 0; border-top: 1px solid rgba(255,255,255,.06); margin-top: .5rem; }
    .summary-item { }
    .summary-item label { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--slate); display: block; margin-bottom: .2rem; }
    .summary-item span { font-size: 1.1rem; font-weight: 800; color: #fff; }
    .summary-item span.total { color: #FCA5A5; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--navy-light, #1E293B); border: 1px solid #2D3B55; border-radius: 16px; padding: 2rem; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { font-size: 1rem; font-weight: 800; margin: 0 0 1.25rem; }
    .modal-footer { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1.5rem; }
    .dash-form-row { margin-bottom: .85rem; }
    .dash-form-row label { display: block; font-size: .75rem; font-weight: 600; color: var(--slate-light, #94A3B8); margin-bottom: .3rem; text-transform: uppercase; letter-spacing: .05em; }
    .dash-form-row input, .dash-form-row select { width: 100%; padding: .65rem .9rem; background: rgba(255,255,255,.05); border: 1px solid #2D3B55; border-radius: 10px; color: #F8FAFC; font-family: inherit; font-size: .9rem; outline: none; }
    .dash-form-row input:focus, .dash-form-row select:focus { border-color: #10B981; }
    .dash-form-row select option { background: #1E293B; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .installments-label { font-size: .72rem; color: var(--slate-light); margin-top: .25rem; }
  </style>
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div><strong>FinanceZap</strong><small>Dashboard</small></div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="dash-page-head">
        <h1>Cartões de Crédito</h1>
        <p>Controle seus gastos e parcelamentos por cartão</p>
      </div>
      <div id="alert"></div>

      <!-- Cards grid -->
      <div class="cards-grid" id="cards-grid">
        <div style="color:var(--slate);text-align:center;padding:2rem">Carregando...</div>
      </div>

      <!-- Fatura do cartão selecionado -->
      <div class="statement-section" id="statement-section">
        <div class="dash-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem">
            <h2 style="margin:0;font-size:.95rem" id="statement-title">Fatura</h2>
            <div class="month-nav">
              <button onclick="prevMonth()">‹ Ant.</button>
              <span id="month-label">—</span>
              <button onclick="nextMonth()">Próx. ›</button>
            </div>
          </div>
          <div id="statement-list"><div style="color:var(--slate);padding:1rem 0">Nenhum lançamento.</div></div>
          <div class="summary-bar" id="statement-summary"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: Novo cartão / Editar cartão -->
  <div class="modal-overlay" id="modal-card">
    <div class="modal">
      <h3 id="modal-card-title">Novo cartão</h3>
      <div class="dash-form-row">
        <label>Nome do cartão *</label>
        <input id="cc-name" type="text" placeholder="Ex.: Nubank, Inter Visa..." />
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label>Banco / Bandeira</label>
          <input id="cc-bank" type="text" placeholder="Nubank, Itaú, Visa..." />
        </div>
        <div class="dash-form-row">
          <label>Últimos 4 dígitos</label>
          <input id="cc-last4" type="text" maxlength="4" placeholder="1234" />
        </div>
      </div>
      <div class="dash-form-row">
        <label>Limite (R$)</label>
        <input id="cc-limit" type="number" min="0" step="0.01" placeholder="5000.00" />
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label>Dia de fechamento</label>
          <input id="cc-closing" type="number" min="1" max="31" placeholder="1-31" />
        </div>
        <div class="dash-form-row">
          <label>Dia de vencimento</label>
          <input id="cc-due" type="number" min="1" max="31" placeholder="1-31" />
        </div>
      </div>
      <div class="dash-form-row">
        <label>Cor</label>
        <input id="cc-color" type="color" value="#8B5CF6" style="height:40px;padding:.2rem .4rem;cursor:pointer" />
      </div>
      <div class="modal-footer">
        <button class="dash-btn dash-btn-ghost" onclick="closeCardModal()">Cancelar</button>
        <button class="dash-btn dash-btn-primary" onclick="saveCard()">Salvar cartão</button>
      </div>
    </div>
  </div>

  <!-- Modal: Novo lançamento -->
  <div class="modal-overlay" id="modal-tx">
    <div class="modal">
      <h3>Novo lançamento</h3>
      <div class="dash-form-row">
        <label>Descrição *</label>
        <input id="tx-desc" type="text" placeholder="Ex.: Compra na Amazon" />
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label>Categoria</label>
          <select id="tx-category">
            <option value="Alimentação">Alimentação</option>
            <option value="Vestuário">Vestuário</option>
            <option value="Eletrônicos">Eletrônicos</option>
            <option value="Transporte">Transporte</option>
            <option value="Saúde">Saúde</option>
            <option value="Lazer">Lazer</option>
            <option value="Viagem">Viagem</option>
            <option value="Assinaturas">Assinaturas</option>
            <option value="Casa">Casa</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
        <div class="dash-form-row">
          <label>Valor total (R$) *</label>
          <input id="tx-amount" type="number" min="0.01" step="0.01" placeholder="150.00" />
        </div>
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label>Parcelas</label>
          <input id="tx-installments" type="number" min="1" max="60" value="1" />
          <div class="installments-label" id="installments-hint">À vista</div>
        </div>
        <div class="dash-form-row">
          <label>Data da compra</label>
          <input id="tx-date" type="date" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="dash-btn dash-btn-ghost" onclick="closeTxModal()">Cancelar</button>
        <button class="dash-btn dash-btn-primary" onclick="saveTx()">Lançar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    let cards = [];
    let selectedCardId = null;
    let editingCardId = null;
    let curYear  = new Date().getFullYear();
    let curMonth = new Date().getMonth() + 1;

    const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    function showAlert(msg, type = "error") {
      const el = document.getElementById("alert");
      el.innerHTML = `<div class="dash-alert ${type === "error" ? "dash-alert-error" : "dash-alert-success"}">${msg}</div>`;
      setTimeout(() => el.innerHTML = "", 4000);
    }

    async function loadCards() {
      const data = await apiFetch("/api/credit-cards");
      cards = data || [];
      renderCards();
    }

    function renderCards() {
      const grid = document.getElementById("cards-grid");
      const cardEls = cards.map(c => {
        const gradient = hexToGradient(c.color || "#8B5CF6");
        const isSelected = c.id === selectedCardId;
        const limit = c.credit_limit > 0 ? `R$ ${Number(c.credit_limit).toLocaleString("pt-BR", { minimumFractionDigits: 2 })}` : "—";
        const closing = c.closing_day ? `Fecha dia ${c.closing_day}` : "";
        const due     = c.due_day ? ` · Vence dia ${c.due_day}` : "";
        const last4   = c.last_four ? `•••• •••• •••• ${c.last_four}` : "";
        return `<div class="credit-card-visual${isSelected ? " selected" : ""}"
            style="background:${gradient}" onclick="selectCard('${c.id}')">
          <div class="cc-top">
            <div>
              <div class="cc-name">${esc(c.name)}</div>
              <div class="cc-bank">${esc(c.bank_name || "")}</div>
            </div>
            <div class="cc-actions" onclick="event.stopPropagation()">
              <button class="cc-btn" onclick="openNewTx('${c.id}')">+ Lançar</button>
              <button class="cc-btn" onclick="editCard('${c.id}')">✏️</button>
              <button class="cc-btn" onclick="deleteCard('${c.id}')">🗑️</button>
            </div>
          </div>
          <div class="cc-mid"><div class="cc-number">${esc(last4)}</div></div>
          <div class="cc-bottom">
            <div>
              <div class="cc-limit-label">Limite</div>
              <div class="cc-limit-value">${limit}</div>
            </div>
            <div class="cc-days" style="text-align:right">${closing}${due}</div>
          </div>
        </div>`;
      }).join("");

      grid.innerHTML = cardEls + `<div class="add-card-btn" onclick="openNewCard()">
        <span>➕</span><span>Adicionar cartão</span>
      </div>`;

      if (selectedCardId) loadStatement();
    }

    function hexToGradient(hex) {
      return `linear-gradient(135deg, ${hex}dd, ${hex}88)`;
    }

    function esc(s) {
      const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML;
    }

    function selectCard(id) {
      selectedCardId = id;
      renderCards();
      document.getElementById("statement-section").classList.add("visible");
      loadStatement();
    }

    async function loadStatement() {
      if (!selectedCardId) return;
      const card = cards.find(c => c.id === selectedCardId);
      if (!card) return;

      document.getElementById("statement-title").textContent = `Fatura — ${card.name}`;
      document.getElementById("month-label").textContent = `${MONTHS_PT[curMonth - 1]} ${curYear}`;

      const data = await apiFetch(`/api/credit-cards/${selectedCardId}/statement?year=${curYear}&month=${curMonth}`);
      renderStatement(data);
    }

    function renderStatement(data) {
      const list = data?.transactions || [];
      const el = document.getElementById("statement-list");

      if (!list.length) {
        el.innerHTML = '<div style="color:var(--slate);padding:1rem 0;text-align:center">Nenhum lançamento neste período.</div>';
        document.getElementById("statement-summary").innerHTML = "";
        return;
      }

      el.innerHTML = list.map(t => {
        const inst = t.installments > 1 ? ` (${t.current_installment}/${t.installments}x)` : "";
        const dateStr = t.purchase_date?.slice(5).replace("-", "/");
        return `<div class="tx-row">
          <div>
            <div class="tx-desc">${esc(t.description || t.category)}</div>
            <div class="tx-meta">${esc(t.category)}${inst} · ${dateStr}</div>
          </div>
          <div style="display:flex;align-items:center;gap:.75rem">
            <div class="tx-amount">R$ ${Number(t.amount).toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</div>
            <button onclick="deleteTx('${t.id}')" style="background:none;border:none;color:var(--slate);cursor:pointer;font-size:1rem">🗑️</button>
          </div>
        </div>`;
      }).join("");

      const total = list.reduce((s, t) => s + Number(t.amount), 0);
      const card = cards.find(c => c.id === selectedCardId);
      const pct = card?.credit_limit > 0 ? ((total / card.credit_limit) * 100).toFixed(1) : null;

      document.getElementById("statement-summary").innerHTML = `
        <div class="summary-item">
          <label>Lançamentos</label>
          <span>${list.length}</span>
        </div>
        <div class="summary-item">
          <label>Total da fatura</label>
          <span class="total">R$ ${total.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</span>
        </div>
        ${pct !== null ? `<div class="summary-item"><label>% do limite</label><span>${pct}%</span></div>` : ""}`;
    }

    function prevMonth() {
      curMonth--;
      if (curMonth < 1) { curMonth = 12; curYear--; }
      loadStatement();
    }
    function nextMonth() {
      curMonth++;
      if (curMonth > 12) { curMonth = 1; curYear++; }
      loadStatement();
    }

    // ── Modal cartão ──────────────────────────────────────────────────────────
    function openNewCard() {
      editingCardId = null;
      document.getElementById("modal-card-title").textContent = "Novo cartão";
      ["cc-name","cc-bank","cc-last4","cc-limit","cc-closing","cc-due"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("cc-color").value = "#8B5CF6";
      document.getElementById("modal-card").classList.add("open");
    }

    function editCard(id) {
      const c = cards.find(x => x.id === id);
      if (!c) return;
      editingCardId = id;
      document.getElementById("modal-card-title").textContent = "Editar cartão";
      document.getElementById("cc-name").value    = c.name || "";
      document.getElementById("cc-bank").value    = c.bank_name || "";
      document.getElementById("cc-last4").value   = c.last_four || "";
      document.getElementById("cc-limit").value   = c.credit_limit || "";
      document.getElementById("cc-closing").value = c.closing_day || "";
      document.getElementById("cc-due").value     = c.due_day || "";
      document.getElementById("cc-color").value   = c.color || "#8B5CF6";
      document.getElementById("modal-card").classList.add("open");
    }

    function closeCardModal() {
      document.getElementById("modal-card").classList.remove("open");
    }

    async function saveCard() {
      const body = {
        name:         document.getElementById("cc-name").value.trim(),
        bank_name:    document.getElementById("cc-bank").value.trim() || null,
        last_four:    document.getElementById("cc-last4").value.trim() || null,
        credit_limit: parseFloat(document.getElementById("cc-limit").value) || 0,
        closing_day:  parseInt(document.getElementById("cc-closing").value) || null,
        due_day:      parseInt(document.getElementById("cc-due").value) || null,
        color:        document.getElementById("cc-color").value,
      };
      if (!body.name) { showAlert("Informe o nome do cartão."); return; }
      try {
        if (editingCardId) {
          await apiFetch(`/api/credit-cards/${editingCardId}`, { method: "PATCH", body: JSON.stringify(body) });
        } else {
          await apiFetch("/api/credit-cards", { method: "POST", body: JSON.stringify(body) });
        }
        closeCardModal();
        await loadCards();
      } catch (e) { showAlert(e.message); }
    }

    async function deleteCard(id) {
      const c = cards.find(x => x.id === id);
      if (!confirm(`Excluir cartão "${c?.name}"? Todos os lançamentos serão removidos.`)) return;
      try {
        await apiFetch(`/api/credit-cards/${id}`, { method: "DELETE" });
        if (selectedCardId === id) {
          selectedCardId = null;
          document.getElementById("statement-section").classList.remove("visible");
        }
        await loadCards();
      } catch (e) { showAlert(e.message); }
    }

    // ── Modal lançamento ──────────────────────────────────────────────────────
    let txCardId = null;

    function openNewTx(cardId) {
      txCardId = cardId;
      document.getElementById("tx-desc").value = "";
      document.getElementById("tx-amount").value = "";
      document.getElementById("tx-installments").value = "1";
      document.getElementById("installments-hint").textContent = "À vista";
      document.getElementById("tx-date").value = new Date().toISOString().slice(0, 10);
      loadCategoriesForSelect();
      document.getElementById("modal-tx").classList.add("open");
    }

    async function loadCategoriesForSelect() {
      try {
        const cats = await apiFetch("/api/categories/expense");
        const sel = document.getElementById("tx-category");
        sel.innerHTML = (cats || []).map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
        if (!sel.options.length) sel.innerHTML = '<option>Geral</option>';
      } catch (_) {}
    }

    document.getElementById("tx-installments").addEventListener("input", function() {
      const n = parseInt(this.value) || 1;
      const amount = parseFloat(document.getElementById("tx-amount").value) || 0;
      if (n <= 1) {
        document.getElementById("installments-hint").textContent = "À vista";
      } else {
        const parcel = amount > 0 ? ` = R$ ${(amount / n).toLocaleString("pt-BR", { minimumFractionDigits: 2 })} por parcela` : "";
        document.getElementById("installments-hint").textContent = `${n}x${parcel}`;
      }
    });

    function closeTxModal() {
      document.getElementById("modal-tx").classList.remove("open");
    }

    async function saveTx() {
      const body = {
        card_id:      txCardId,
        description:  document.getElementById("tx-desc").value.trim(),
        category:     document.getElementById("tx-category").value,
        amount:       parseFloat(document.getElementById("tx-amount").value),
        installments: parseInt(document.getElementById("tx-installments").value) || 1,
        purchase_date:document.getElementById("tx-date").value,
      };
      if (!body.description) { showAlert("Informe a descrição."); return; }
      if (!body.amount || body.amount <= 0) { showAlert("Informe um valor válido."); return; }
      try {
        await apiFetch("/api/credit-card-transactions", { method: "POST", body: JSON.stringify(body) });
        closeTxModal();
        if (selectedCardId === txCardId) loadStatement();
        else { selectedCardId = txCardId; renderCards(); document.getElementById("statement-section").classList.add("visible"); loadStatement(); }
      } catch (e) { showAlert(e.message); }
    }

    async function deleteTx(id) {
      if (!confirm("Excluir este lançamento?")) return;
      try {
        await apiFetch(`/api/credit-card-transactions/${id}`, { method: "DELETE" });
        loadStatement();
      } catch (e) { showAlert(e.message); }
    }

    loadCards();
  </script>
</body>
</html>
