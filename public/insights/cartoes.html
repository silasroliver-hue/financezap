<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cartões de Crédito — FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    /* ── Lista de cartões ── */
    .cc-list { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.5rem; }

    .cc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 1px solid var(--dash-border);
      border-left: 4px solid var(--dash-accent);
      border-radius: var(--dash-radius);
      box-shadow: var(--dash-shadow);
      flex-wrap: wrap;
    }

    .cc-item-left { display: flex; align-items: center; gap: .85rem; min-width: 0; }
    .cc-item-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0;
      background: var(--dash-accent-soft);
    }
    .cc-item-name { font-size: .95rem; font-weight: 800; color: var(--dash-ink); }
    .cc-item-meta { font-size: .75rem; color: var(--dash-muted); margin-top: .15rem; }

    .cc-item-right {
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .cc-item-limit {
      font-size: .85rem; font-weight: 700; color: var(--dash-ink);
      white-space: nowrap;
    }
    .cc-item-actions { display: flex; gap: .35rem; flex-wrap: wrap; }

    /* Botão "Ver fatura" ativo */
    .cc-item.active-card { border-left-width: 4px; background: var(--dash-accent-soft); }
    .cc-item.active-card .cc-item-name { color: var(--dash-accent-dark); }

    /* ── Adicionar cartão ── */
    .cc-add-btn {
      display: flex; align-items: center; gap: .75rem;
      padding: 1rem 1.25rem;
      background: #fff; border: 2px dashed var(--dash-border);
      border-radius: var(--dash-radius);
      cursor: pointer; font-family: var(--dash-font); font-size: .9rem;
      font-weight: 700; color: var(--dash-muted);
      transition: all .15s; width: 100%;
    }
    .cc-add-btn:hover { border-color: var(--dash-accent); color: var(--dash-accent); background: var(--dash-accent-soft); }
    .cc-add-icon { width: 42px; height: 42px; border-radius: 10px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }

    /* ── Fatura ── */
    .month-nav { display: flex; align-items: center; gap: .75rem; }
    .month-nav button {
      background: #f1f5f9; border: 1px solid var(--dash-border);
      color: var(--dash-ink); padding: .35rem .75rem; border-radius: 8px;
      cursor: pointer; font-size: .85rem; font-family: var(--dash-font); font-weight: 600;
    }
    .month-nav button:hover { background: var(--dash-accent-soft); border-color: var(--dash-accent); color: var(--dash-accent); }
    .month-nav span { font-weight: 700; font-size: .95rem; color: var(--dash-ink); min-width: 120px; text-align: center; }

    .tx-row { display: flex; justify-content: space-between; align-items: center; padding: .7rem 0; border-bottom: 1px solid var(--dash-border-soft); }
    .tx-row:last-child { border-bottom: none; }
    .tx-desc { font-size: .88rem; font-weight: 700; color: var(--dash-ink); }
    .tx-meta { font-size: .72rem; color: var(--dash-muted); margin-top: .15rem; }
    .tx-amount { font-size: .9rem; font-weight: 700; color: var(--dash-expense); }

    .summary-bar {
      display: flex; gap: 1.5rem; padding: 1rem 0;
      border-top: 1px solid var(--dash-border); margin-top: .5rem; flex-wrap: wrap;
    }
    .summary-item label { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--dash-muted); display: block; margin-bottom: .2rem; }
    .summary-item span { font-size: 1.05rem; font-weight: 800; color: var(--dash-ink); }
    .summary-item span.total { color: var(--dash-expense); }

    .statement-section { display: none; }
    .statement-section.visible { display: block; }

    /* ── Modal ── */
    .cc-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.45); z-index: 400;
      align-items: center; justify-content: center;
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
      padding: 1rem;
    }
    .cc-modal-overlay.open { display: flex; }
    .cc-modal {
      background: #fff; border: 1px solid var(--dash-border);
      border-radius: 18px; padding: 1.75rem; width: 100%;
      max-width: 420px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    .cc-modal h3 { font-size: 1.05rem; font-weight: 800; margin: 0 0 1.25rem; color: var(--dash-ink); }
    .cc-modal-footer { display: flex; gap: .5rem; justify-content: flex-end; margin-top: 1.5rem; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .installments-label { font-size: .72rem; color: var(--dash-muted); margin-top: .3rem; }

    @media (max-width: 768px) {
      .cc-item { flex-direction: column; align-items: flex-start; }
      .cc-item-right { width: 100%; justify-content: space-between; }
      .cc-add-btn { font-size: .85rem; }
      .two-col { grid-template-columns: 1fr; }
      .summary-bar { gap: 1rem; }
      .month-nav { flex-wrap: wrap; }
      .cc-modal { padding: 1.25rem; border-radius: 14px; }
    }
  </style>
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div><strong>FinanceZap</strong><small>Dashboard</small></div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="dash-page-head" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
        <div>
          <h1>Cartões de Crédito</h1>
          <p>Controle seus gastos e parcelamentos por cartão</p>
        </div>
        <button class="dash-btn dash-btn-primary" onclick="openNewCard()">+ Novo cartão</button>
      </div>
      <div id="alert"></div>

      <!-- Lista de cartões -->
      <div class="cc-list" id="cards-list">
        <p class="dash-note">Carregando...</p>
      </div>

      <!-- Fatura do cartão selecionado -->
      <div class="statement-section" id="statement-section">
        <div class="dash-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem">
            <h2 style="margin:0;font-size:.95rem" id="statement-title">Fatura</h2>
            <div class="month-nav">
              <button onclick="prevMonth()">‹</button>
              <span id="month-label">—</span>
              <button onclick="nextMonth()">›</button>
            </div>
          </div>
          <div id="statement-list"></div>
          <div class="summary-bar" id="statement-summary"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal: Novo cartão / Editar cartão -->
  <div class="cc-modal-overlay" id="modal-card">
    <div class="cc-modal">
      <h3 id="modal-card-title">Novo cartão</h3>
      <div class="dash-form-row">
        <label for="cc-name">Nome do cartão *</label>
        <input id="cc-name" type="text" placeholder="Ex.: Nubank, Inter, Itaú..." />
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label for="cc-bank">Banco / Bandeira</label>
          <input id="cc-bank" type="text" placeholder="Ex.: Visa, Mastercard" />
        </div>
        <div class="dash-form-row">
          <label for="cc-last4">Últimos 4 dígitos</label>
          <input id="cc-last4" type="text" maxlength="4" placeholder="1234" />
        </div>
      </div>
      <div class="dash-form-row">
        <label for="cc-limit">Limite (R$)</label>
        <input id="cc-limit" type="number" min="0" step="0.01" placeholder="5000,00" />
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label for="cc-closing">Dia de fechamento</label>
          <input id="cc-closing" type="number" min="1" max="31" placeholder="Ex.: 1" />
        </div>
        <div class="dash-form-row">
          <label for="cc-due">Dia de vencimento</label>
          <input id="cc-due" type="number" min="1" max="31" placeholder="Ex.: 10" />
        </div>
      </div>
      <div class="dash-form-row">
        <label for="cc-color">Cor</label>
        <input id="cc-color" type="color" value="#10B981" class="accounts-color-input" />
      </div>
      <div class="cc-modal-footer">
        <button class="dash-btn dash-btn-ghost" onclick="closeCardModal()">Cancelar</button>
        <button class="dash-btn dash-btn-primary" onclick="saveCard()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal: Novo lançamento -->
  <div class="cc-modal-overlay" id="modal-tx">
    <div class="cc-modal">
      <h3 id="modal-tx-title">Novo lançamento</h3>
      <div class="dash-form-row">
        <label for="tx-desc">Descrição *</label>
        <input id="tx-desc" type="text" placeholder="Ex.: Mercado, Netflix, Farmácia" />
      </div>
      <div class="dash-form-row">
        <label for="tx-category">Categoria</label>
        <select id="tx-category"></select>
      </div>
      <div class="two-col">
        <div class="dash-form-row">
          <label for="tx-amount">Valor total (R$) *</label>
          <input id="tx-amount" type="number" min="0.01" step="0.01" placeholder="0,00" />
        </div>
        <div class="dash-form-row">
          <label for="tx-installments">Parcelas</label>
          <input id="tx-installments" type="number" min="1" max="60" value="1" />
          <div class="installments-label" id="installments-hint">À vista</div>
        </div>
      </div>
      <div class="dash-form-row">
        <label for="tx-date">Data da compra</label>
        <input id="tx-date" type="date" />
      </div>
      <div class="cc-modal-footer">
        <button class="dash-btn dash-btn-ghost" onclick="closeTxModal()">Cancelar</button>
        <button class="dash-btn dash-btn-primary" onclick="saveTx()">Lançar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    (async () => {
      const cfg = await fetch('/api/config').then(r => r.json());
      window.__SUPABASE_URL__ = cfg.supabaseUrl;
      window.__SUPABASE_ANON_KEY__ = cfg.supabaseAnonKey;
    })();
  </script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    let cards = [];
    let selectedCardId = null;
    let editingCardId = null;
    let curYear  = new Date().getFullYear();
    let curMonth = new Date().getMonth() + 1;

    const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    function esc(s) {
      const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML;
    }

    function showAlert(msg, type = "error") {
      const el = document.getElementById("alert");
      el.innerHTML = `<div class="dash-alert">${msg}</div>`;
      setTimeout(() => el.innerHTML = "", 4000);
    }

    async function loadCards() {
      const data = await apiFetch("/credit-cards");
      cards = data || [];
      renderCards();
    }

    function renderCards() {
      const list = document.getElementById("cards-list");

      if (!cards.length) {
        list.innerHTML = `<p class="dash-empty">Nenhum cartão cadastrado. Clique em "+ Novo cartão" para começar.</p>`;
        return;
      }

      list.innerHTML = cards.map(c => {
        const isActive = c.id === selectedCardId;
        const limit = c.credit_limit > 0
          ? `Limite: ${fmtBRL(c.credit_limit)}`
          : "Sem limite cadastrado";
        const meta = [
          c.bank_name || "",
          c.last_four ? `•••• ${c.last_four}` : "",
          c.closing_day ? `Fecha dia ${c.closing_day}` : "",
          c.due_day ? `Vence dia ${c.due_day}` : "",
        ].filter(Boolean).join(" · ");

        return `<div class="cc-item${isActive ? " active-card" : ""}" style="border-left-color:${esc(c.color || "#10B981")}">
          <div class="cc-item-left">
            <div class="cc-item-icon" style="background:${esc(c.color || "#10B981")}22">💳</div>
            <div>
              <div class="cc-item-name">${esc(c.name)}</div>
              <div class="cc-item-meta">${esc(meta) || "Sem detalhes"}</div>
            </div>
          </div>
          <div class="cc-item-right">
            <div class="cc-item-limit">${limit}</div>
            <div class="cc-item-actions">
              <button class="dash-btn dash-btn-primary dash-btn-tiny" onclick="openNewTx('${c.id}')">+ Lançar</button>
              <button class="dash-btn dash-btn-ghost dash-btn-tiny" onclick="selectCard('${c.id}')">Ver fatura</button>
              <button class="dash-btn dash-btn-ghost dash-btn-tiny" onclick="editCard('${c.id}')">Editar</button>
              <button class="dash-btn dash-btn-danger dash-btn-tiny" onclick="deleteCard('${c.id}')">Excluir</button>
            </div>
          </div>
        </div>`;
      }).join("");

      if (selectedCardId) loadStatement();
    }

    function selectCard(id) {
      selectedCardId = id;
      renderCards();
      document.getElementById("statement-section").classList.add("visible");
      document.getElementById("statement-section").scrollIntoView({ behavior: "smooth", block: "start" });
      loadStatement();
    }

    async function loadStatement() {
      if (!selectedCardId) return;
      const card = cards.find(c => c.id === selectedCardId);
      if (!card) return;
      document.getElementById("statement-title").textContent = `Fatura — ${card.name}`;
      document.getElementById("month-label").textContent = `${MONTHS_PT[curMonth - 1]} ${curYear}`;
      const data = await apiFetch(`/credit-cards/${selectedCardId}/statement?year=${curYear}&month=${curMonth}`);
      renderStatement(data);
    }

    function renderStatement(data) {
      const list = data?.transactions || [];
      const el = document.getElementById("statement-list");

      if (!list.length) {
        el.innerHTML = '<p class="dash-empty">Nenhum lançamento neste período.</p>';
        document.getElementById("statement-summary").innerHTML = "";
        return;
      }

      el.innerHTML = list.map(t => {
        const inst = t.installments > 1 ? ` (${t.current_installment}/${t.installments}x)` : "";
        const dateStr = t.purchase_date?.slice(5).replace("-", "/") || "";
        return `<div class="tx-row">
          <div>
            <div class="tx-desc">${esc(t.description || t.category)}</div>
            <div class="tx-meta">${esc(t.category)}${esc(inst)} · ${esc(dateStr)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem">
            <div class="tx-amount">${fmtBRL(t.amount)}</div>
            <button onclick="deleteTx('${t.id}')" style="background:none;border:none;color:var(--dash-muted);cursor:pointer;font-size:.85rem;padding:.2rem .4rem;border-radius:6px" title="Excluir">✕</button>
          </div>
        </div>`;
      }).join("");

      const total = list.reduce((s, t) => s + Number(t.amount), 0);
      const card = cards.find(c => c.id === selectedCardId);
      const pct = card?.credit_limit > 0 ? ((total / card.credit_limit) * 100).toFixed(1) : null;

      document.getElementById("statement-summary").innerHTML = `
        <div class="summary-item">
          <label>Lançamentos</label>
          <span>${list.length}</span>
        </div>
        <div class="summary-item">
          <label>Total da fatura</label>
          <span class="total">${fmtBRL(total)}</span>
        </div>
        ${pct !== null ? `<div class="summary-item"><label>% do limite</label><span>${pct}%</span></div>` : ""}`;
    }

    function prevMonth() {
      curMonth--;
      if (curMonth < 1) { curMonth = 12; curYear--; }
      loadStatement();
    }
    function nextMonth() {
      curMonth++;
      if (curMonth > 12) { curMonth = 1; curYear++; }
      loadStatement();
    }

    // ── Modal cartão ──────────────────────────────────────────────────────────
    function openNewCard() {
      editingCardId = null;
      document.getElementById("modal-card-title").textContent = "Novo cartão";
      ["cc-name","cc-bank","cc-last4","cc-limit","cc-closing","cc-due"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("cc-color").value = "#10B981";
      document.getElementById("modal-card").classList.add("open");
    }

    function editCard(id) {
      const c = cards.find(x => x.id === id);
      if (!c) return;
      editingCardId = id;
      document.getElementById("modal-card-title").textContent = "Editar cartão";
      document.getElementById("cc-name").value    = c.name || "";
      document.getElementById("cc-bank").value    = c.bank_name || "";
      document.getElementById("cc-last4").value   = c.last_four || "";
      document.getElementById("cc-limit").value   = c.credit_limit || "";
      document.getElementById("cc-closing").value = c.closing_day || "";
      document.getElementById("cc-due").value     = c.due_day || "";
      document.getElementById("cc-color").value   = c.color || "#10B981";
      document.getElementById("modal-card").classList.add("open");
    }

    function closeCardModal() {
      document.getElementById("modal-card").classList.remove("open");
    }

    async function saveCard() {
      const body = {
        name:         document.getElementById("cc-name").value.trim(),
        bank_name:    document.getElementById("cc-bank").value.trim() || null,
        last_four:    document.getElementById("cc-last4").value.trim() || null,
        credit_limit: parseFloat(document.getElementById("cc-limit").value) || 0,
        closing_day:  parseInt(document.getElementById("cc-closing").value) || null,
        due_day:      parseInt(document.getElementById("cc-due").value) || null,
        color:        document.getElementById("cc-color").value,
      };
      if (!body.name) { showAlert("Informe o nome do cartão."); return; }
      try {
        if (editingCardId) {
          await apiFetch(`/credit-cards/${editingCardId}`, { method: "PATCH", body: JSON.stringify(body) });
        } else {
          await apiFetch("/credit-cards", { method: "POST", body: JSON.stringify(body) });
        }
        closeCardModal();
        await loadCards();
      } catch (e) { showAlert(e.message); }
    }

    async function deleteCard(id) {
      const c = cards.find(x => x.id === id);
      if (!confirm(`Excluir cartão "${c?.name}"? Todos os lançamentos serão removidos.`)) return;
      try {
        await apiFetch(`/credit-cards/${id}`, { method: "DELETE" });
        if (selectedCardId === id) {
          selectedCardId = null;
          document.getElementById("statement-section").classList.remove("visible");
        }
        await loadCards();
      } catch (e) { showAlert(e.message); }
    }

    // ── Modal lançamento ──────────────────────────────────────────────────────
    let txCardId = null;

    function openNewTx(cardId) {
      txCardId = cardId;
      const card = cards.find(c => c.id === cardId);
      document.getElementById("modal-tx-title").textContent = `Lançar em: ${card?.name || "Cartão"}`;
      document.getElementById("tx-desc").value = "";
      document.getElementById("tx-amount").value = "";
      document.getElementById("tx-installments").value = "1";
      document.getElementById("installments-hint").textContent = "À vista";
      document.getElementById("tx-date").value = new Date().toISOString().slice(0, 10);
      loadCategoriesForSelect();
      document.getElementById("modal-tx").classList.add("open");
    }

    async function loadCategoriesForSelect() {
      try {
        const cats = await apiFetch("/categories/user?kind=expense");
        const sel = document.getElementById("tx-category");
        const names = (cats || []).map(c => c.name || c);
        sel.innerHTML = names.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
        if (!sel.options.length) setDefaultCategories();
      } catch (_) { setDefaultCategories(); }
    }

    function setDefaultCategories() {
      document.getElementById("tx-category").innerHTML =
        ["Alimentação","Transporte","Lazer","Saúde","Casa","Vestuário","Eletrônicos","Assinaturas","Outros"]
          .map(c => `<option value="${c}">${c}</option>`).join("");
    }

    document.getElementById("tx-installments").addEventListener("input", function() {
      const n = parseInt(this.value) || 1;
      const amount = parseFloat(document.getElementById("tx-amount").value) || 0;
      if (n <= 1) {
        document.getElementById("installments-hint").textContent = "À vista";
      } else {
        const parcel = amount > 0 ? ` = ${fmtBRL(amount / n)} por parcela` : "";
        document.getElementById("installments-hint").textContent = `${n}x${parcel}`;
      }
    });

    function closeTxModal() {
      document.getElementById("modal-tx").classList.remove("open");
    }

    async function saveTx() {
      const body = {
        card_id:       txCardId,
        description:   document.getElementById("tx-desc").value.trim(),
        category:      document.getElementById("tx-category").value,
        amount:        parseFloat(document.getElementById("tx-amount").value),
        installments:  parseInt(document.getElementById("tx-installments").value) || 1,
        purchase_date: document.getElementById("tx-date").value,
      };
      if (!body.description) { showAlert("Informe a descrição."); return; }
      if (!body.amount || body.amount <= 0) { showAlert("Informe um valor válido."); return; }
      try {
        await apiFetch("/credit-card-transactions", { method: "POST", body: JSON.stringify(body) });
        closeTxModal();
        selectedCardId = txCardId;
        renderCards();
        document.getElementById("statement-section").classList.add("visible");
        loadStatement();
      } catch (e) { showAlert(e.message); }
    }

    async function deleteTx(id) {
      if (!confirm("Excluir este lançamento?")) return;
      try {
        await apiFetch(`/credit-card-transactions/${id}`, { method: "DELETE" });
        loadStatement();
      } catch (e) { showAlert(e.message); }
    }

    renderSidebarNav("cartoes");

    window.addEventListener("DOMContentLoaded", async () => {
      let tries = 0;
      while (!window.__SUPABASE_URL__ && tries++ < 30) await new Promise(r => setTimeout(r, 100));
      const ok = await checkAccess();
      if (!ok) return;
      renderSidebarUser();
      loadCards();
    });
  </script>
</body>
</html>
