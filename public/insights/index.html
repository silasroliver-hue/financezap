<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .8rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .month-nav button {
      border: 1px solid var(--dash-border);
      background: #fff;
      border-radius: 10px;
      padding: .35rem .65rem;
      font-size: .82rem;
      font-weight: 700;
      color: var(--dash-ink);
      cursor: pointer;
      font-family: var(--dash-font);
    }

    .month-nav strong {
      min-width: 128px;
      text-align: center;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: .8rem;
      margin-bottom: 1rem;
    }

    .summary-card {
      border: 1px solid var(--dash-border);
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--dash-shadow);
      padding: .9rem;
    }

    .summary-card label {
      display: block;
      font-size: .68rem;
      text-transform: uppercase;
      color: var(--dash-muted);
      letter-spacing: .05em;
      margin-bottom: .3rem;
    }

    .summary-card strong {
      font-size: 1.1rem;
      color: var(--dash-ink);
    }

    .summary-card strong.inc { color: var(--dash-income); }
    .summary-card strong.exp { color: var(--dash-expense); }

    .dash-grid {
      display: grid;
      gap: .9rem;
    }

    @media (min-width: 980px) {
      .dash-grid {
        grid-template-columns: 1.2fr .8fr;
      }
    }

    .chart-card canvas {
      width: 100% !important;
      max-height: 240px;
    }

    .simple-list {
      display: grid;
      gap: .65rem;
      margin-top: .75rem;
    }

    .simple-item {
      border: 1px solid var(--dash-border-soft);
      border-radius: 12px;
      background: #f8fafc;
      padding: .75rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .6rem;
    }

    .simple-item-title {
      margin: 0;
      font-size: .88rem;
      font-weight: 800;
      color: var(--dash-ink);
    }

    .simple-item-sub {
      margin-top: .25rem;
      font-size: .76rem;
      color: var(--dash-muted);
    }

    .cat-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      align-items: center;
      padding: .45rem 0;
      border-bottom: 1px solid var(--dash-border-soft);
      font-size: .83rem;
    }

    .cat-row:last-child {
      border-bottom: none;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(2, 6, 23, .45);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      background: #fff;
      border: 1px solid var(--dash-border);
      border-radius: 14px;
      box-shadow: 0 20px 56px rgba(2, 6, 23, .24);
      padding: 1rem;
    }

    .modal-card h3 {
      margin: 0 0 .9rem;
      font-size: 1rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
      margin-top: 1rem;
    }

    .credit-radar-card {
      border: 1px solid #c7f9e5;
      background: linear-gradient(145deg, #f7fffb 0%, #ecfdf5 62%, #ffffff 100%);
    }

    .credit-radar-top {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: .65rem;
      margin-top: .75rem;
    }

    .credit-pill {
      border: 1px solid #ccefe0;
      border-radius: 12px;
      background: rgba(255,255,255,.95);
      padding: .62rem .75rem;
    }

    .credit-pill label {
      display: block;
      font-size: .67rem;
      text-transform: uppercase;
      color: #0f766e;
      letter-spacing: .06em;
      margin-bottom: .28rem;
      font-weight: 800;
    }

    .credit-pill strong {
      font-size: 1rem;
      color: var(--dash-ink);
    }

    .credit-list {
      margin-top: .82rem;
      display: grid;
      gap: .55rem;
    }

    .credit-row {
      border: 1px solid #d5f5e7;
      border-radius: 12px;
      background: #fff;
      padding: .62rem .75rem;
    }

    .credit-row-head {
      display: flex;
      justify-content: space-between;
      gap: .5rem;
      align-items: center;
      margin-bottom: .42rem;
      font-size: .84rem;
    }

    .credit-row-head strong {
      font-size: .9rem;
      color: var(--dash-ink);
    }

    .credit-row-head span {
      color: #0f766e;
      font-weight: 800;
      white-space: nowrap;
    }

    .credit-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #def7ec;
      overflow: hidden;
    }

    .credit-bar > i {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #10b981 0%, #059669 100%);
      width: 0%;
      transition: width .25s ease;
    }

    .credit-row-sub {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: .36rem;
      font-size: .74rem;
      color: var(--dash-muted);
      gap: .5rem;
    }
  </style>
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div>
            <strong>FinanceZap</strong>
            <small>Dashboard</small>
          </div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="head-row">
        <div class="month-nav">
          <button type="button" onclick="changeMonth(-1)">Mes anterior</button>
          <strong id="month-label">-</strong>
          <button type="button" onclick="changeMonth(1)">Proximo mes</button>
        </div>
        <button class="dash-btn dash-btn-primary" type="button" onclick="openModal()">+ Lancamento</button>
      </div>

      <div id="alert"></div>

      <section class="cards-grid">
        <article class="summary-card">
          <label>Saldo da conta unica</label>
          <strong id="balance-total">R$ 0,00</strong>
        </article>
        <article class="summary-card">
          <label>Entradas no mes</label>
          <strong id="income-month" class="inc">R$ 0,00</strong>
        </article>
        <article class="summary-card">
          <label>Saidas no mes</label>
          <strong id="expense-month" class="exp">R$ 0,00</strong>
        </article>
        <article class="summary-card">
          <label>Resultado do mes</label>
          <strong id="balance-month">R$ 0,00</strong>
        </article>
      </section>

      <section class="dash-grid" style="margin-bottom:1rem">
        <article class="dash-card chart-card">
          <h2 style="margin:0 0 .7rem">Evolucao do mes</h2>
          <canvas id="line-chart"></canvas>
        </article>
        <article class="dash-card chart-card">
          <h2 style="margin:0 0 .7rem">Gastos por categoria</h2>
          <canvas id="donut-chart"></canvas>
        </article>
      </section>

      <section style="margin-bottom:1rem">
        <article class="dash-card credit-radar-card">
          <div class="dash-card-head" style="margin-bottom:.2rem">
            <h2 style="margin:0">Radar do cartão de crédito</h2>
            <a class="dash-link" href="cartoes.html">Abrir cartões</a>
          </div>
          <p class="dash-note" style="margin:0">Visão rápida do mês atual e do próximo mês.</p>
          <div id="credit-radar-top" class="credit-radar-top"></div>
          <div id="credit-radar-list" class="credit-list"></div>
        </article>
      </section>

      <section class="dash-grid">
        <article class="dash-card">
          <div class="dash-card-head" style="margin-bottom:.65rem">
            <h2 style="margin:0">Lançamentos recentes</h2>
            <a class="dash-link" href="gastos.html">Ver tudo</a>
          </div>
          <div id="recent-list" class="simple-list"></div>
        </article>

        <article class="dash-card">
          <h2 style="margin:0 0 .65rem">Categorias com mais gasto</h2>
          <div id="cats-list"></div>
        </article>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="modal-lancamento">
    <div class="modal-card">
      <h3>Novo lancamento</h3>
      <form id="form-lancamento">
        <div class="dash-form-row">
          <label for="m-kind">Tipo</label>
          <select id="m-kind" required>
            <option value="expense">Despesa</option>
            <option value="income">Receita</option>
            <option value="credit_card">Cartao de credito</option>
          </select>
        </div>

        <div id="normal-fields">
          <div class="dash-form-row">
            <label for="m-category">Categoria</label>
            <select id="m-category"></select>
          </div>
          <div class="dash-form-row">
            <label for="m-payment">Forma de pagamento</label>
            <select id="m-payment">
              <option value="">Nao informar</option>
              <option value="pix">PIX</option>
              <option value="debito">Debito</option>
              <option value="boleto">Boleto</option>
              <option value="dinheiro">Dinheiro</option>
              <option value="transferencia">Transferencia</option>
            </select>
          </div>
        </div>

        <div id="card-fields" style="display:none">
          <div class="dash-form-row">
            <label for="m-card-id">Qual cartao?</label>
            <select id="m-card-id"></select>
          </div>
          <div class="dash-form-row">
            <label for="m-card-category">Categoria</label>
            <select id="m-card-category"></select>
          </div>
          <div class="dash-form-row">
            <label for="m-installments">Parcelas</label>
            <input id="m-installments" type="number" min="1" max="60" value="1" />
          </div>
        </div>

        <div class="dash-form-row">
          <label for="m-amount">Valor (R$)</label>
          <input id="m-amount" type="number" min="0.01" step="0.01" required />
        </div>
        <div class="dash-form-row">
          <label for="m-date">Data</label>
          <input id="m-date" type="date" required />
        </div>
        <div class="dash-form-row">
          <label for="m-description">Descricao</label>
          <input id="m-description" type="text" placeholder="Ex.: Mercado, Aluguel, Salario" />
        </div>

        <div class="modal-actions">
          <button type="button" class="dash-btn dash-btn-ghost" onclick="closeModal()">Cancelar</button>
          <button type="submit" class="dash-btn dash-btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderSidebarNav("dash");

    const MONTHS_PT = ["Janeiro", "Fevereiro", "Marco", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let curYear = new Date().getFullYear();
    let curMonth = new Date().getMonth() + 1;
    let lineChart = null;
    let donutChart = null;

    const kindEl = document.getElementById("m-kind");
    const normalFields = document.getElementById("normal-fields");
    const cardFields = document.getElementById("card-fields");

    function esc(value) {
      const div = document.createElement("div");
      div.textContent = value == null ? "" : String(value);
      return div.innerHTML;
    }

    function escAttr(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;");
    }

    function monthLabel(year, month) {
      return `${MONTHS_PT[month - 1]} ${year}`;
    }

    function showAlert(message, type) {
      const el = document.getElementById("alert");
      const cls = type === "ok" ? "dash-alert dash-alert-ok" : "dash-alert";
      el.innerHTML = `<div class="${cls}">${esc(message)}</div>`;
      setTimeout(() => {
        el.innerHTML = "";
      }, 4000);
    }

    function openModal() {
      kindEl.value = "expense";
      document.getElementById("m-amount").value = "";
      document.getElementById("m-description").value = "";
      document.getElementById("m-installments").value = "1";
      document.getElementById("m-date").value = new Date().toISOString().slice(0, 10);
      document.getElementById("m-payment").value = "";
      onKindChange();
      document.getElementById("modal-lancamento").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal-lancamento").classList.remove("open");
    }

    async function loadCategories(targetId, kind) {
      const sel = document.getElementById(targetId);
      sel.innerHTML = '<option value="">Carregando...</option>';
      try {
        const list = await apiFetch(`/categories/${encodeURIComponent(kind)}`);
        const rows = Array.isArray(list) ? list : [];
        sel.innerHTML = rows.length
          ? rows.map((item) => `<option value="${escAttr(item)}">${esc(item)}</option>`).join("")
          : '<option value="Outros">Outros</option>';
      } catch (_) {
        sel.innerHTML = '<option value="Outros">Outros</option>';
      }
    }

    async function loadCards() {
      const sel = document.getElementById("m-card-id");
      sel.innerHTML = '<option value="">Carregando...</option>';
      try {
        const cards = await apiFetch("/credit-cards");
        const rows = Array.isArray(cards) ? cards : [];
        sel.innerHTML = rows.length
          ? '<option value="">Selecione o cartao</option>' + rows.map((card) => `<option value="${escAttr(card.id)}">${esc(card.name)}</option>`).join("")
          : '<option value="">Nenhum cartao cadastrado</option>';
      } catch (_) {
        sel.innerHTML = '<option value="">Erro ao carregar cartoes</option>';
      }
    }

    async function onKindChange() {
      const kind = kindEl.value;
      const isCard = kind === "credit_card";
      normalFields.style.display = isCard ? "none" : "block";
      cardFields.style.display = isCard ? "block" : "none";

      if (isCard) {
        await loadCards();
        await loadCategories("m-card-category", "expense");
      } else {
        await loadCategories("m-category", kind === "income" ? "income" : "expense");
      }
    }

    async function submitLaunch(event) {
      event.preventDefault();

      const kind = kindEl.value;
      const amount = Number(document.getElementById("m-amount").value);
      const occurredOn = document.getElementById("m-date").value;
      const description = document.getElementById("m-description").value.trim();

      if (!Number.isFinite(amount) || amount <= 0) {
        showAlert("Informe um valor valido.");
        return;
      }

      try {
        if (kind === "credit_card") {
          const cardId = document.getElementById("m-card-id").value;
          if (!cardId) {
            showAlert("Selecione um cartao.");
            return;
          }
          const category = document.getElementById("m-card-category").value || "Outros";
          const installments = Math.max(1, parseInt(String(document.getElementById("m-installments").value || 1), 10) || 1);

          await apiFetch("/credit-card-transactions", {
            method: "POST",
            body: JSON.stringify({
              card_id: cardId,
              description,
              category,
              amount,
              installments,
              purchase_date: occurredOn,
            }),
          });
        } else {
          const category = document.getElementById("m-category").value || "Outros";
          const paymentMethod = document.getElementById("m-payment").value || null;

          await apiFetch("/transactions", {
            method: "POST",
            body: JSON.stringify({
              kind,
              category,
              amount,
              occurred_on: occurredOn,
              description,
              source: "manual",
              payment_method: paymentMethod,
            }),
          });
        }

        closeModal();
        await loadDashboard();
        showAlert("Lancamento salvo com sucesso.", "ok");
      } catch (err) {
        showAlert(err.message || "Nao foi possivel salvar o lancamento.");
      }
    }

    function renderSummary(d) {
      document.getElementById("month-label").textContent = monthLabel(curYear, curMonth);
      document.getElementById("balance-total").textContent = fmtBRL(d.balanceTotalAllTime || 0);
      document.getElementById("income-month").textContent = fmtBRL(d.income || 0);
      document.getElementById("expense-month").textContent = fmtBRL(d.expense || 0);

      const monthBalance = Number(d.balance || 0);
      const monthEl = document.getElementById("balance-month");
      monthEl.textContent = fmtBRL(monthBalance);
      monthEl.className = monthBalance < 0 ? "exp" : "inc";
    }

    function renderRecent(d) {
      const list = document.getElementById("recent-list");
      const items = Array.isArray(d.recentTransactions) ? d.recentTransactions : [];
      if (!items.length) {
        list.innerHTML = '<p class="dash-empty">Nenhum lançamento recente.</p>';
        return;
      }

      list.innerHTML = items.slice(0, 10).map((row) => {
        const isIncome = row.kind === "income";
        return `
          <article class="simple-item">
            <div style="min-width:0;flex:1">
              <h3 class="simple-item-title">${esc(row.description || row.category || "Lancamento")}</h3>
              <div class="simple-item-sub">${esc(row.category || "Geral")} · ${esc(fmtDate(row.occurred_on))}</div>
            </div>
            <strong class="${isIncome ? "dash-text-inc" : "dash-text-exp"}">${fmtBRL(row.amount || 0)}</strong>
          </article>
        `;
      }).join("");
    }

    function renderCategories(d) {
      const el = document.getElementById("cats-list");
      const rows = Array.isArray(d.expenseByCategory) ? d.expenseByCategory : [];
      if (!rows.length) {
        el.innerHTML = '<p class="dash-empty">Sem gastos categorizados neste mes.</p>';
        return;
      }

      el.innerHTML = rows.slice(0, 10).map((row) => `
        <div class="cat-row">
          <span>${esc(row.category || "Geral")}</span>
          <strong>${fmtBRL(row.amount || 0)}</strong>
        </div>
      `).join("");
    }

    function renderCharts(d) {
      const daily = Array.isArray(d.daily) ? d.daily : [];
      const lineCtx = document.getElementById("line-chart");
      const donutCtx = document.getElementById("donut-chart");
      if (!lineCtx || !donutCtx || typeof Chart === "undefined") return;

      const labels = daily.map((row) => String(row.day).padStart(2, "0"));
      const incomeData = daily.map((row) => Number(row.income || 0));
      const expenseData = daily.map((row) => Number(row.expense || 0));

      if (lineChart) lineChart.destroy();
      lineChart = new Chart(lineCtx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Entradas",
              data: incomeData,
              borderColor: "#059669",
              backgroundColor: "rgba(5,150,105,.15)",
              tension: .3,
              fill: false,
              borderWidth: 2
            },
            {
              label: "Saidas",
              data: expenseData,
              borderColor: "#dc2626",
              backgroundColor: "rgba(220,38,38,.15)",
              tension: .3,
              fill: false,
              borderWidth: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: "bottom" } },
          scales: { y: { beginAtZero: true } }
        }
      });

      const catRows = Array.isArray(d.expenseByCategory) ? d.expenseByCategory : [];
      const topRows = catRows.slice(0, 6);
      const colors = ["#ef4444", "#f97316", "#f59e0b", "#84cc16", "#06b6d4", "#8b5cf6"];

      if (donutChart) donutChart.destroy();
      if (!topRows.length) return;
      donutChart = new Chart(donutCtx, {
        type: "doughnut",
        data: {
          labels: topRows.map((row) => row.category || "Geral"),
          datasets: [{ data: topRows.map((row) => Number(row.amount || 0)), backgroundColor: colors.slice(0, topRows.length), borderWidth: 0 }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: "62%",
          plugins: { legend: { position: "bottom" } }
        }
      });
    }

    function renderCreditRadar(overview) {
      const topEl = document.getElementById("credit-radar-top");
      const listEl = document.getElementById("credit-radar-list");
      const cards = Array.isArray(overview?.cards) ? overview.cards : [];

      if (!cards.length) {
        topEl.innerHTML = `
          <article class="credit-pill">
            <label>Status</label>
            <strong>Nenhum cartao cadastrado</strong>
          </article>
        `;
        listEl.innerHTML = '<p class="dash-empty">Cadastre um cartão e seus lançamentos aparecerão aqui.</p>';
        return;
      }

      const currentTotal = cards.reduce((sum, row) => sum + (Number(row.currentMonthTotal) || 0), 0);
      const nextTotal = cards.reduce((sum, row) => sum + (Number(row.nextMonthTotal) || 0), 0);
      const plannedTotal = cards.reduce((sum, row) => sum + (Number(row.plannedTotal) || 0), 0);
      const topCard = [...cards].sort((a, b) => (Number(b.currentMonthTotal) || 0) - (Number(a.currentMonthTotal) || 0))[0];
      const trendPct = currentTotal > 0 ? ((nextTotal - currentTotal) / currentTotal) * 100 : 0;
      const trendTxt = currentTotal > 0
        ? `${trendPct >= 0 ? "+" : ""}${trendPct.toFixed(0)}% vs mês atual`
        : "Sem base para comparação";

      topEl.innerHTML = `
        <article class="credit-pill">
          <label>Total no mês</label>
          <strong>${fmtBRL(currentTotal)}</strong>
        </article>
        <article class="credit-pill">
          <label>Previsto próximo mês</label>
          <strong>${fmtBRL(nextTotal)}</strong>
        </article>
        <article class="credit-pill">
          <label>Mais pesado no mês</label>
          <strong>${esc(topCard?.name || "—")}</strong>
        </article>
        <article class="credit-pill">
          <label>Tendência</label>
          <strong>${esc(trendTxt)}</strong>
        </article>
      `;

      listEl.innerHTML = cards.map((card) => {
        const monthValue = Number(card.currentMonthTotal) || 0;
        const nextValue = Number(card.nextMonthTotal) || 0;
        const pct = currentTotal > 0 ? Math.max(6, Math.min(100, (monthValue / currentTotal) * 100)) : 6;
        return `
          <article class="credit-row">
            <div class="credit-row-head">
              <strong>${esc(card.name || "Cartão")}</strong>
              <span>${fmtBRL(monthValue)}</span>
            </div>
            <div class="credit-bar"><i style="width:${pct}%"></i></div>
            <div class="credit-row-sub">
              <span>Próximo mês: ${fmtBRL(nextValue)}</span>
              <span>Total planejado: ${fmtBRL(Number(card.plannedTotal) || 0)}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadDashboard() {
      const [data, creditOverview] = await Promise.all([
        apiFetch(`/dashboard?year=${curYear}&month=${curMonth}`),
        apiFetch(`/credit-cards/overview?year=${curYear}&month=${curMonth}&months=2`).catch(() => ({ cards: [], months: [] })),
      ]);
      const d = data || {};
      renderSummary(d);
      renderRecent(d);
      renderCategories(d);
      renderCharts(d);
      renderCreditRadar(creditOverview || { cards: [], months: [] });
    }

    function changeMonth(delta) {
      curMonth += delta;
      if (curMonth < 1) {
        curMonth = 12;
        curYear -= 1;
      } else if (curMonth > 12) {
        curMonth = 1;
        curYear += 1;
      }
      loadDashboard().catch((err) => showAlert(err.message || "Nao foi possivel carregar o dashboard."));
    }

    document.getElementById("form-lancamento").addEventListener("submit", submitLaunch);
    kindEl.addEventListener("change", onKindChange);

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const ok = await checkAccess();
        if (!ok) return;
        await renderSidebarUser();
        document.getElementById("m-date").value = new Date().toISOString().slice(0, 10);
        await onKindChange();
        await loadDashboard();
      } catch (err) {
        showAlert(err.message || "Nao foi possivel carregar o dashboard.");
      }
    });
  </script>
</body>
</html>
