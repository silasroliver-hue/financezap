<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .8rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }

    .month-nav button {
      border: 1px solid var(--dash-border);
      background: #fff;
      border-radius: 10px;
      padding: .35rem .65rem;
      font-size: .82rem;
      font-weight: 700;
      color: var(--dash-ink);
      cursor: pointer;
      font-family: var(--dash-font);
    }

    .month-nav strong {
      min-width: 128px;
      text-align: center;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: .8rem;
      margin-bottom: 1rem;
    }

    .summary-card {
      border: 1px solid var(--dash-border);
      border-radius: 14px;
      background: #fff;
      box-shadow: var(--dash-shadow);
      padding: .9rem;
    }

    .summary-card label {
      display: block;
      font-size: .68rem;
      text-transform: uppercase;
      color: var(--dash-muted);
      letter-spacing: .05em;
      margin-bottom: .3rem;
    }

    .summary-card strong {
      font-size: 1.1rem;
      color: var(--dash-ink);
    }

    .summary-card strong.inc { color: var(--dash-income); }
    .summary-card strong.exp { color: var(--dash-expense); }

    .dash-grid {
      display: grid;
      gap: .9rem;
    }

    @media (min-width: 980px) {
      .dash-grid {
        grid-template-columns: 1.2fr .8fr;
      }
    }

    .simple-list {
      display: grid;
      gap: .65rem;
      margin-top: .75rem;
    }

    .simple-item {
      border: 1px solid var(--dash-border-soft);
      border-radius: 12px;
      background: #f8fafc;
      padding: .75rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .6rem;
    }

    .simple-item-title {
      margin: 0;
      font-size: .88rem;
      font-weight: 800;
      color: var(--dash-ink);
    }

    .simple-item-sub {
      margin-top: .25rem;
      font-size: .76rem;
      color: var(--dash-muted);
    }

    .cat-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      align-items: center;
      padding: .45rem 0;
      border-bottom: 1px solid var(--dash-border-soft);
      font-size: .83rem;
    }

    .cat-row:last-child {
      border-bottom: none;
    }

    .setup-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #78350f;
      border-radius: 12px;
      padding: .8rem;
      margin-bottom: 1rem;
      font-size: .84rem;
      line-height: 1.45;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(2, 6, 23, .45);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--dash-border);
      border-radius: 14px;
      box-shadow: 0 20px 56px rgba(2, 6, 23, .24);
      padding: 1rem;
    }

    .modal-card h3 {
      margin: 0 0 .9rem;
      font-size: 1rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: .5rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div>
            <strong>FinanceZap</strong>
            <small>Dashboard</small>
          </div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="head-row">
        <div class="month-nav">
          <button type="button" onclick="changeMonth(-1)">Mes anterior</button>
          <strong id="month-label">-</strong>
          <button type="button" onclick="changeMonth(1)">Proximo mes</button>
        </div>
        <a class="dash-btn dash-btn-primary" href="gastos.html?novo=1">+ Novo lancamento</a>
      </div>

      <div id="alert"></div>
      <div id="setup-box"></div>

      <section class="cards-grid">
        <article class="summary-card">
          <label>Saldo da conta unica</label>
          <strong id="balance-total">R$ 0,00</strong>
        </article>
        <article class="summary-card">
          <label>Entradas no mes</label>
          <strong id="income-month" class="inc">R$ 0,00</strong>
        </article>
        <article class="summary-card">
          <label>Saidas no mes</label>
          <strong id="expense-month" class="exp">R$ 0,00</strong>
        </article>
        <article class="summary-card">
          <label>Resultado do mes</label>
          <strong id="balance-month">R$ 0,00</strong>
        </article>
      </section>

      <section class="dash-grid">
        <article class="dash-card">
          <div class="dash-card-head" style="margin-bottom:.65rem">
            <h2 style="margin:0">Lançamentos recentes</h2>
            <a class="dash-link" href="gastos.html">Ver tudo</a>
          </div>
          <div id="recent-list" class="simple-list"></div>
        </article>

        <article class="dash-card">
          <h2 style="margin:0 0 .65rem">Categorias com mais gasto</h2>
          <div id="cats-list"></div>
        </article>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="setup-modal">
    <div class="modal-card">
      <h3>Definir saldo inicial da conta</h3>
      <div class="dash-form-row" style="margin:0">
        <label for="setup-amount">Saldo inicial (R$)</label>
        <input id="setup-amount" type="number" min="0" step="0.01" placeholder="Ex.: 2500" />
      </div>
      <div class="modal-actions">
        <button class="dash-btn dash-btn-ghost" onclick="closeSetupModal()">Agora nao</button>
        <button class="dash-btn dash-btn-primary" onclick="saveInitialBalance()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderSidebarNav("dash");

    const MONTHS_PT = ["Janeiro", "Fevereiro", "Marco", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let curYear = new Date().getFullYear();
    let curMonth = new Date().getMonth() + 1;
    let dashboardData = null;

    function esc(value) {
      const div = document.createElement("div");
      div.textContent = value == null ? "" : String(value);
      return div.innerHTML;
    }

    function monthLabel(year, month) {
      return `${MONTHS_PT[month - 1]} ${year}`;
    }

    function showAlert(message, type) {
      const el = document.getElementById("alert");
      const cls = type === "ok" ? "dash-alert dash-alert-ok" : "dash-alert";
      el.innerHTML = `<div class="${cls}">${esc(message)}</div>`;
      setTimeout(() => {
        el.innerHTML = "";
      }, 4000);
    }

    function changeMonth(delta) {
      curMonth += delta;
      if (curMonth < 1) {
        curMonth = 12;
        curYear -= 1;
      } else if (curMonth > 12) {
        curMonth = 1;
        curYear += 1;
      }
      loadDashboard().catch((err) => showAlert(err.message || "Nao foi possivel carregar o dashboard."));
    }

    function renderSummary(d) {
      document.getElementById("month-label").textContent = monthLabel(curYear, curMonth);
      document.getElementById("balance-total").textContent = fmtBRL(d.balanceTotalAllTime || 0);
      document.getElementById("income-month").textContent = fmtBRL(d.income || 0);
      document.getElementById("expense-month").textContent = fmtBRL(d.expense || 0);

      const monthBalance = Number(d.balance || 0);
      const monthEl = document.getElementById("balance-month");
      monthEl.textContent = fmtBRL(monthBalance);
      monthEl.className = monthBalance < 0 ? "exp" : "inc";
    }

    function renderSetupHint(d) {
      const box = document.getElementById("setup-box");
      const hasRecent = Array.isArray(d.recentTransactions) && d.recentTransactions.length > 0;
      const totalAbs = Math.abs(Number(d.balanceTotalAllTime || 0));

      if (hasRecent || totalAbs > 0.009) {
        box.innerHTML = "";
        return;
      }

      box.innerHTML = `
        <div class="setup-box">
          Sua conta ainda está zerada. Para começar, você pode definir um saldo inicial e depois só lançar entradas e saídas normalmente.<br />
          <button class="dash-btn dash-btn-secondary" style="margin-top:.55rem" onclick="openSetupModal()">Definir saldo inicial</button>
        </div>
      `;
    }

    function renderRecent(d) {
      const list = document.getElementById("recent-list");
      const items = Array.isArray(d.recentTransactions) ? d.recentTransactions : [];
      if (!items.length) {
        list.innerHTML = '<p class="dash-empty">Nenhum lançamento recente.</p>';
        return;
      }

      list.innerHTML = items.slice(0, 10).map((row) => {
        const isIncome = row.kind === "income";
        return `
          <article class="simple-item">
            <div style="min-width:0;flex:1">
              <h3 class="simple-item-title">${esc(row.description || row.category || "Lancamento")}</h3>
              <div class="simple-item-sub">${esc(row.category || "Geral")} · ${esc(fmtDate(row.occurred_on))}</div>
            </div>
            <strong class="${isIncome ? "dash-text-inc" : "dash-text-exp"}">${fmtBRL(row.amount || 0)}</strong>
          </article>
        `;
      }).join("");
    }

    function renderCategories(d) {
      const el = document.getElementById("cats-list");
      const rows = Array.isArray(d.expenseByCategory) ? d.expenseByCategory : [];
      if (!rows.length) {
        el.innerHTML = '<p class="dash-empty">Sem gastos categorizados neste mes.</p>';
        return;
      }

      el.innerHTML = rows.slice(0, 10).map((row) => `
        <div class="cat-row">
          <span>${esc(row.category || "Geral")}</span>
          <strong>${fmtBRL(row.amount || 0)}</strong>
        </div>
      `).join("");
    }

    async function loadDashboard() {
      const d = await apiFetch(`/dashboard?year=${curYear}&month=${curMonth}`);
      dashboardData = d || {};
      renderSummary(dashboardData);
      renderSetupHint(dashboardData);
      renderRecent(dashboardData);
      renderCategories(dashboardData);
    }

    function openSetupModal() {
      document.getElementById("setup-amount").value = "";
      document.getElementById("setup-modal").classList.add("open");
    }

    function closeSetupModal() {
      document.getElementById("setup-modal").classList.remove("open");
    }

    async function saveInitialBalance() {
      const amount = Number(document.getElementById("setup-amount").value);
      if (!Number.isFinite(amount) || amount < 0) {
        showAlert("Informe um saldo inicial valido.");
        return;
      }

      try {
        await apiFetch("/transactions", {
          method: "POST",
          body: JSON.stringify({
            kind: "income",
            category: "Saldo inicial",
            amount,
            occurred_on: new Date().toISOString().slice(0, 10),
            description: "Saldo inicial da conta",
            source: "manual",
          }),
        });
        closeSetupModal();
        await loadDashboard();
        showAlert("Saldo inicial salvo com sucesso.", "ok");
      } catch (err) {
        showAlert(err.message || "Nao foi possivel salvar o saldo inicial.");
      }
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const ok = await checkAccess();
        if (!ok) return;
        await renderSidebarUser();
        await loadDashboard();
      } catch (err) {
        showAlert(err.message || "Nao foi possivel carregar o dashboard.");
      }
    });
  </script>
</body>
</html>
