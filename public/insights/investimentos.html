<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Investimentos — FinanceZap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dash-body">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-brand">
        <a href="/" class="dash-sidebar-logo">
          <div class="dash-sidebar-logo-icon">💰</div>
          <div>
            <strong>FinanceZap</strong>
            <small>Dashboard</small>
          </div>
        </a>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="dash-sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="dash-main">
      <div class="dash-page-head">
        <h1>Investimentos</h1>
        <p>Posições por instituição financeira</p>
      </div>
      <div id="alert"></div>

      <div class="dash-card">
        <h2 style="margin:0 0 1rem;font-size:.95rem">Nova posição</h2>
        <form id="add-form" class="dash-form-inline" style="align-items:flex-end">
          <div class="dash-form-row" style="margin:0">
            <label for="broker">Instituição</label>
            <input id="broker" type="text" required placeholder="Ex.: Nubank, XP, C6" style="min-width:12rem" />
          </div>
          <div class="dash-form-row" style="margin:0">
            <label for="balance">Saldo (R$)</label>
            <input id="balance" type="number" step="0.01" min="0" required style="width:8rem" />
          </div>
          <div class="dash-form-row" style="margin:0;flex:1;min-width:10rem">
            <label for="notes">Observações</label>
            <input id="notes" type="text" placeholder="Opcional" style="max-width:none" />
          </div>
          <button type="submit" class="dash-btn dash-btn-primary">✚ Adicionar</button>
        </form>
      </div>

      <div class="dash-card" style="margin-top:1rem">
        <div class="dash-card-head">
          <h2 style="margin:0;font-size:.95rem">Posições</h2>
          <span class="dash-note" id="total" style="margin:0;font-weight:700;font-size:.9rem"></span>
        </div>
        <div id="list" class="dash-stack"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    (async () => {
      const cfg = await fetch('/api/config').then(r => r.json());
      window.__SUPABASE_URL__ = cfg.supabaseUrl;
      window.__SUPABASE_ANON_KEY__ = cfg.supabaseAnonKey;
    })();
  </script>
  <script src="/js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderSidebarNav("inv");

    function esc(s) {
      const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML;
    }

    async function load() {
      const alertEl = document.getElementById("alert");
      alertEl.innerHTML = "";
      try {
        const rows = await apiFetch("/investments");
        if (!rows) return;
        const list = document.getElementById("list");
        let total = 0;
        rows.forEach(r => { total += Number(r.balance); });
        document.getElementById("total").textContent = rows.length ? "Total: " + fmtBRL(total) : "";

        if (!rows.length) {
          list.innerHTML = '<p class="dash-empty">Nenhuma posição cadastrada ainda.</p>';
          return;
        }

        list.innerHTML = rows.map(r => `
          <div class="dash-subcard dash-bill-row">
            <div>
              <strong>${esc(r.broker_name)}</strong>
              <div class="dash-note" style="margin-top:.2rem">${esc(r.notes || "—")}</div>
            </div>
            <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
              <div style="font-size:1.2rem;font-weight:800;color:var(--dash-income)">${fmtBRL(r.balance)}</div>
              <div style="display:flex;gap:.4rem">
                <button type="button" class="dash-btn dash-btn-ghost dash-btn-tiny" data-id="${r.id}" data-bal="${r.balance}">Atualizar</button>
                <button type="button" class="dash-btn dash-btn-danger dash-btn-tiny" data-del="${r.id}">Excluir</button>
              </div>
            </div>
          </div>
        `).join("");

        list.querySelectorAll("button[data-id]").forEach(btn => {
          btn.addEventListener("click", async () => {
            const id = btn.getAttribute("data-id");
            const cur = btn.getAttribute("data-bal");
            const v = prompt("Novo saldo (R$)?", cur);
            if (v == null) return;
            const n = Number(String(v).replace(",", "."));
            if (!Number.isFinite(n) || n < 0) return;
            try {
              await apiFetch("/investments/" + id, { method: "PATCH", body: JSON.stringify({ balance: n }) });
              await load();
            } catch(e) { alert(e.message); }
          });
        });

        list.querySelectorAll("button[data-del]").forEach(btn => {
          btn.addEventListener("click", async () => {
            if (!confirm("Excluir esta posição?")) return;
            const id = btn.getAttribute("data-del");
            try {
              await apiFetch("/investments/" + id, { method: "DELETE" });
              await load();
            } catch(e) { alert(e.message); }
          });
        });
      } catch(e) {
        document.getElementById("alert").innerHTML = '<div class="dash-alert">' + esc(e.message) + '</div>';
      }
    }

    document.getElementById("add-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const body = {
        broker_name: document.getElementById("broker").value,
        balance: document.getElementById("balance").value,
        notes: document.getElementById("notes").value || null,
      };
      try {
        await apiFetch("/investments", { method: "POST", body: JSON.stringify(body) });
        document.getElementById("broker").value = "";
        document.getElementById("balance").value = "";
        document.getElementById("notes").value = "";
        await load();
      } catch(e) {
        document.getElementById("alert").innerHTML = '<div class="dash-alert">' + esc(e.message) + '</div>';
      }
    });

    window.addEventListener("DOMContentLoaded", async () => {
      let tries = 0;
      while (!window.__SUPABASE_URL__ && tries++ < 30) await new Promise(r => setTimeout(r, 100));
      const ok = await checkAccess();
      if (!ok) return;
      renderSidebarUser();
      load();
    });
  </script>
</body>
</html>
